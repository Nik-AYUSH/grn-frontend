<!DOCTYPE html>
<html>
<head>
    <title>YMKS — GRN Register</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --green:       #4CAF50;
            --green-dark:  #388E3C;
            --green-light: #66BB6A;
            --green-pale:  #E8F5E9;
            --green-mid:   #A5D6A7;
            --white:       #ffffff;
            --off-white:   #f9fafb;
            --text-dark:   #1a2e1b;
            --text-mid:    #4a6741;
            --text-light:  #7da876;
            --border:      rgba(76,175,80,0.15);
            --shadow:      0 25px 60px rgba(56,142,60,0.12);
            --radius:      14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* ✅ Global readability improvements */

 body {
            font-family: 'DM Sans', sans-serif;
            background: var(--off-white);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 14px;
            font-weight: 400;        /* was 450 — fixes issue #9 too */
            letter-spacing: 0.1px;
            -webkit-font-smoothing: antialiased;
        }        


/* Table cells bolder */
tbody td {
    font-weight: 500;
    font-size: 13.5px;
    color: var(--text-dark);
}

/* Headers bolder */
thead th {
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1.2px;
}

/* Stat values */
.stat-value {
    font-weight: 800;
}

.stat-label {
    font-weight: 600;
    font-size: 11.5px;
    letter-spacing: 1.2px;
}

/* Badges */
.badge {
    font-weight: 700;
    font-size: 12px;
}

/* Buttons */
.btn {
    font-weight: 700;
    letter-spacing: 0.3px;
}

/* Filter inputs */
.filter-input {
    font-weight: 500;
    font-size: 13.5px;
}

/* Header title */
.header-title {
    font-weight: 800;
    font-size: 23px;
}

.header-subtitle {
    font-weight: 600;
    letter-spacing: 2px;
}

/* Dropdown */
.dropdown-username {
    font-weight: 700;
}

.dropdown-item {
    font-weight: 500;
}

/* Popup headings */
.popup h3 {
    font-weight: 800;
}

/* Form labels */
.form-label {
    font-weight: 700;
    letter-spacing: 1.8px;
}

/* Month badge */
.month-badge {
    font-weight: 700;
    font-size: 13px;
}

.insight-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 12px;
    border-left: 4px solid var(--green);
}

.insight-card.warning {
    border-left-color: #f59e0b;
    background: #fffbeb;
}

.insight-card.alert {
    border-left-color: #ef4444;
    background: #fef2f2;
}

.insight-card.info {
    border-left-color: #3b82f6;
    background: #eff6ff;
}

.insight-title {
    font-weight: 700;
    font-size: 14px;
    color: var(--text-dark);
    margin-bottom: 6px;
}

.insight-desc {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.6;
}

.insight-action {
    font-size: 12px;
    color: var(--green-dark);
    font-weight: 600;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
}

.chat-bubble {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    max-width: 85%;
    line-height: 1.5;
}

.chat-bubble.user {
    background: var(--green-pale);
    color: var(--text-dark);
    align-self: flex-end;
    border-bottom-right-radius: 3px;
}

.chat-bubble.ai {
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--text-mid);
    align-self: flex-start;
    border-bottom-left-radius: 3px;
}

/* Table title */
.table-title {
    font-weight: 800;
    font-size: 19px;
}

       

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(76,175,80,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(76,175,80,0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        header {
            position: relative;
            z-index: 10;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
            box-shadow: 0 2px 16px rgba(56,142,60,0.08);
            animation: slideDown 0.6s ease both;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-logo {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--green-dark), var(--green));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            box-shadow: 0 4px 12px rgba(76,175,80,0.3);
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--green-dark);
        }

        .header-subtitle {
            font-size: 11px;
            color: var(--text-light);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 1px;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-download {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--green-dark), var(--green));
            color: var(--white);
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(76,175,80,0.25);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(76,175,80,0.4);
        }

        .btn-stock {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--green-pale);
            color: var(--green-dark);
            border: 1.5px solid rgba(76,175,80,0.3);
            padding: 10px 22px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-stock:hover {
            background: var(--green);
            color: var(--white);
            border-color: var(--green);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(76,175,80,0.3);
        }

        /* Settings dropdown */
        .settings-wrapper { position: relative; }

        .btn-settings {
            width: 38px;
            height: 38px;
            background: var(--green-pale);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--green-dark);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .btn-settings:hover {
            background: var(--green);
            color: var(--white);
            border-color: var(--green);
        }

        .settings-dropdown {
            display: none;
            position: absolute;
            top: 46px;
            right: 0;
            background: var(--white);
            border: 1px solid rgba(76,175,80,0.2);
            border-radius: 12px;
            padding: 8px;
            min-width: 210px;
            box-shadow: 0 16px 40px rgba(56,142,60,0.15);
            z-index: 9999;
            animation: dropDown 0.2s ease;
        }

        @keyframes dropDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .settings-dropdown.open { display: block; }

        .dropdown-user {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 6px;
        }

        .dropdown-username {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .dropdown-role {
            font-size: 11px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 7px;
            font-size: 13px;
            color: var(--text-mid);
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: 'DM Sans', sans-serif;
        }

        .dropdown-item:hover {
            background: var(--green-pale);
            color: var(--green-dark);
        }

        .dropdown-item.danger { color: #dc2626; }
        .dropdown-item.danger:hover {
            background: rgba(239,68,68,0.08);
            color: #dc2626;
        }

        main {
            position: relative;
            z-index: 1;
            padding: 36px 40px;
            animation: fadeUp 0.7s 0.2s ease both;
        }

        @keyframes fadeUp {
            from { transform: translateY(24px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .calendar-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: 0 4px 24px rgba(56,142,60,0.08);
        }

        .fc { font-family: 'DM Sans', sans-serif !important; }
        .fc .fc-toolbar-title { font-family: 'Playfair Display', serif !important; font-size: 20px !important; color: var(--text-dark) !important; }
        .fc .fc-button { background: var(--green-pale) !important; border: 1.5px solid rgba(76,175,80,0.25) !important; color: var(--green-dark) !important; font-family: 'DM Sans', sans-serif !important; font-size: 13px !important; border-radius: 7px !important; padding: 6px 14px !important; transition: all 0.2s ease !important; box-shadow: none !important; }
        .fc .fc-button:hover { background: var(--green) !important; border-color: var(--green) !important; color: var(--white) !important; }
        .fc .fc-button-primary:not(:disabled).fc-button-active { background: var(--green-dark) !important; border-color: var(--green-dark) !important; color: var(--white) !important; }
        .fc .fc-col-header-cell { background: var(--green-pale) !important; border-color: var(--border) !important; }
        .fc .fc-col-header-cell-cushion { color: var(--green-dark) !important; font-size: 12px !important; font-weight: 600 !important; letter-spacing: 1px !important; text-transform: uppercase !important; text-decoration: none !important; padding: 10px 0 !important; }
        .fc .fc-daygrid-day { border-color: var(--border) !important; transition: background 0.2s ease !important; }
        .fc .fc-daygrid-day:hover { background: rgba(76,175,80,0.06) !important; cursor: pointer; }
        .fc .fc-daygrid-day-number { color: var(--text-mid) !important; font-size: 13px !important; font-weight: 500 !important; text-decoration: none !important; padding: 6px 8px !important; }
        .fc .fc-day-today { background: rgba(76,175,80,0.08) !important; }
        .fc .fc-day-today .fc-daygrid-day-number { color: var(--green-dark) !important; font-weight: 700 !important; }
        .fc .fc-event { border-radius: 5px !important; font-size: 11px !important; font-weight: 500 !important; padding: 2px 6px !important; box-shadow: 0 2px 8px rgba(76,175,80,0.3) !important; transition: all 0.2s ease !important; color: var(--white) !important; }
        .fc .fc-event.grn-event { background: linear-gradient(135deg, var(--green-dark), var(--green)) !important; border: none !important; }
        .fc .fc-event.issue-event { background: #ef4444 !important; border: 1px solid #dc2626 !important; }
        .fc .fc-event:hover { transform: translateY(-1px) !important; box-shadow: 0 4px 14px rgba(76,175,80,0.45) !important; }
        .fc-theme-standard td, .fc-theme-standard th { border-color: var(--border) !important; }
        .fc-scrollgrid { border-color: var(--border) !important; }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26,46,27,0.5);
            backdrop-filter: blur(6px);
            z-index: 9999;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            background: var(--white);
            border: 1px solid rgba(76,175,80,0.2);
            border-radius: var(--radius);
            padding: 32px;
            z-index: 10000;
            box-shadow: 0 40px 80px rgba(56,142,60,0.2);
            animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.9); opacity: 0; }
            to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
        }

        .popup h3 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--text-dark);
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .popup h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: linear-gradient(to bottom, var(--green-dark), var(--green));
            border-radius: 2px;
        }

        .popup table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .popup table th { background: var(--green-pale); color: var(--green-dark); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 12px 14px; border: 1px solid var(--border); white-space: nowrap; }
        .popup table td { padding: 10px 10px; border: 1px solid var(--border); vertical-align: top; }

        .popup input, .popup select {
            background: var(--off-white);
            border: 1.5px solid rgba(76,175,80,0.2);
            border-radius: 7px;
            color: var(--text-dark);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 8px 10px;
            width: 100%;
            transition: all 0.2s ease;
            outline: none;
        }

        .popup input:focus, .popup select:focus {
            border-color: var(--green);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
        }

        .popup input[readonly] { background: var(--green-pale); color: var(--green-dark); border-color: var(--border); }
        .popup select option { background: var(--white); color: var(--text-dark); }

        .qtyBox {
            display: none;
            margin-top: 10px;
            background: var(--green-pale);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 12px;
        }

        .qtyBox div { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .qtyBox div:last-child { margin-bottom: 0; }
        .qtyBox label { font-size: 11px; color: var(--text-light); letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; width: 65px; flex-shrink: 0; }
        .qtyBox input { width: 100px !important; }

        .btn-row { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

        .btn { padding: 10px 22px; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.22s ease; letter-spacing: 0.2px; }
        .btn-primary { background: linear-gradient(135deg, var(--green-dark), var(--green)); color: var(--white); box-shadow: 0 4px 14px rgba(76,175,80,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(76,175,80,0.45); }
        .btn-secondary { background: var(--off-white); color: var(--text-mid); border: 1.5px solid var(--border); }
        .btn-secondary:hover { background: var(--green-pale); color: var(--green-dark); }
        .btn-danger { background: rgba(239,68,68,0.08); color: #dc2626; border: 1px solid rgba(239,68,68,0.2); }
        .btn-danger:hover { background: rgba(239,68,68,0.15); transform: translateY(-2px); }

        #itemPopup { width: 92%; max-width: 980px; max-height: 85vh; overflow-y: auto; }
        #itemPopup::-webkit-scrollbar { width: 5px; }
        #itemPopup::-webkit-scrollbar-track { background: transparent; }
        #itemPopup::-webkit-scrollbar-thumb { background: rgba(76,175,80,0.3); border-radius: 10px; }

        #stockToast {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            padding: 16px 22px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(56,142,60,0.2);
            animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
            line-height: 1.5;
        }

        @keyframes toastIn {
            from { transform: translateY(20px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .toast-success {
            background: var(--green-pale);
            border: 1px solid rgba(76,175,80,0.3);
            color: var(--green-dark);
        }

        .toast-warning {
            background: #fff8e1;
            border: 1px solid rgba(251,191,36,0.3);
            color: #92400e;
        }

        .toast-title { font-weight: 700; margin-bottom: 4px; font-size: 14px; }
        /* Item description autocomplete */
        .autocomplete-wrapper {
            position: relative;
            width: 100%;
        }

        .autocomplete-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--white);
            border: 1.5px solid rgba(76,175,80,0.3);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 99999;
            box-shadow: 0 8px 24px rgba(56,142,60,0.15);
            margin-top: 4px;
        }

        .autocomplete-item {
            padding: 10px 14px;
            font-size: 13px;
            color: var(--text-dark);
            cursor: pointer;
            border-bottom: 1px solid rgba(76,175,80,0.1);
            transition: background 0.15s ease;
            }

        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background: var(--green-pale); color: var(--green-dark); }
        .autocomplete-item mark { background: rgba(76,175,80,0.2); color: var(--green-dark); border-radius: 2px; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="header-logo">Y</div>
        <div>
            <div class="header-title">GRN Register</div>
            <div class="header-subtitle">Goods Receipt Note Management</div>
        </div>
    </div>
    <div class="header-right">
        <button class="btn-stock" onclick="window.location.href='stock.html'">
            📊 Stock Register
        </button>
        <button class="btn-stock" onclick="downloadStock()">
            📦 Download Stock
        </button>
        <button class="btn-stock" onclick="downloadIssues()">
            📤 Download Issues
        </button>
        <button class="btn-download" onclick="downloadExcel()">
            ⬇ Download GRN
        </button>
        <button class="btn-stock" onclick="openAIAnalytics()">
            🤖 AI Insights
        </button>
        <div class="settings-wrapper">
            <button class="btn-settings" onclick="toggleSettings()" id="settingsBtn">⚙️</button>
            <div class="settings-dropdown" id="settingsDropdown">
                <div class="dropdown-user">
                    <div class="dropdown-username" id="dropdownUsername">Loading...</div>
                    <div class="dropdown-role" id="dropdownRole"></div>
                </div>
                <button class="dropdown-item" onclick="window.location.href='stock.html'">
                    📊 Stock Register
                </button>
                <button class="dropdown-item" onclick="window.location.href='admin.html'" id="adminLink" style="display:none">
                    👥 Manage Users
                </button>
                <button class="dropdown-item danger" onclick="logout()">
                    🚪 Logout
                </button>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="calendar-card">
        <div id="calendar"></div>
    </div>
</main>

<div id="overlay"></div>
<div id="stockToast"></div>

<div id="aiPopup" class="popup" style="width:700px; max-width:95vw; max-height:85vh; overflow-y:auto;">
    <h3>AI Insights</h3>
    <div id="aiContent" style="font-size:13px; color:var(--text-mid); line-height:1.8;">
        <div id="aiLoading" style="text-align:center; padding:40px; display:none;">
            <div style="font-size:24px; margin-bottom:12px;">🤖</div>
            <div>Analyzing your GRN data...</div>
        </div>
        <div id="aiResults" style="display:none;"></div>
        <div id="aiEmpty" style="text-align:center; padding:40px; display:none;">
            <div style="font-size:24px; margin-bottom:12px;">📦</div>
            <div>No GRN data found for analysis.</div>
        </div>
    </div>

    <div id="aiChatBox" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:16px;">
        <div id="aiChatHistory" style="max-height:200px; overflow-y:auto; margin-bottom:12px; display:flex; flex-direction:column; gap:8px;"></div>
        <div style="display:flex; gap:8px;">
            <input id="aiChatInput" placeholder="Ask about your GRN data..."
                style="flex:1; background:var(--off-white); border:1.5px solid rgba(76,175,80,0.2); border-radius:7px; padding:8px 12px; font-family:'DM Sans',sans-serif; font-size:13px; outline:none;"
                onkeydown="if(event.key==='Enter') askAI()">
            <button class="btn btn-primary" onclick="askAI()" id="askBtn">Ask →</button>
        </div>
    </div>

    <div class="btn-row">
        <button class="btn btn-secondary" onclick="closeAIPopup()">Close</button>
        <button class="btn btn-primary" onclick="openAIAnalytics()">🔄 Refresh</button>
    </div>
</div>

<!-- GRN Form Popup -->

<script>
const API = "https://grn-backend-production.up.railway.app";

// ✅ Immediate auth check
const _token = localStorage.getItem("token");
if (!_token) window.location.href = "login.html";

let selectedDate = null;
let selectedEvent = null;
let currentGRNId = null;
let calendar = null;

document.addEventListener('DOMContentLoaded', function () {
    const username = localStorage.getItem("username");
    const role     = localStorage.getItem("role");
    document.getElementById("dropdownUsername").textContent = username || "User";
    document.getElementById("dropdownRole").textContent = role ? role.replace(/_/g, " ") : "";
    if (role === "admin") document.getElementById("adminLink").style.display = "flex";

    calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        eventOrder:  "order,start",
        events: async function (fetchInfo, successCallback, failureCallback) {
    try {
        // ✅ Get the month range visible in the calendar
        const start = fetchInfo.startStr.substring(0, 7); // YYYY-MM
        const end   = fetchInfo.endStr.substring(0, 7);   // YYYY-MM

        // ✅ Fetch GRN entries and audit log in parallel
        // Use audit log for issues since it has all months
        const [grnRes, auditRes] = await Promise.all([
            fetch(`${API}/entries`),
            fetch(`${API}/auditLog`, {
                headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }
            })
        ]);

        const grnData   = await grnRes.json();
        const auditData = await auditRes.json();

        // ✅ GRN events — green
        const grnEvents = grnData.map(e => ({
            id:              String(e.id),
            title:           [e.col1, e.col2, e.col3, e.col4, e.col5, e.col6].join(" | "),
            date:            e.date,
            backgroundColor: "#388E3C",
            borderColor:     "#2E7D32",
            textColor:       "#ffffff",
            order:           1
        }));

        // ✅ Issue events from audit log — red
        const issueEvents = auditData
            .filter(a => a.type === "Issue" && a.timestamp)
            .map(a => ({
                id:              `issue-${a.id}`,
                title:           `📤 ${a.itemDesc} (−${a.qty})`,
                date:            a.timestamp.split("T")[0],
                backgroundColor: "#ef4444",
                borderColor:     "#dc2626",
                textColor:       "#ffffff",
                order:           99,
                extendedProps:   { isIssue: true }
            }));

        successCallback([...grnEvents, ...issueEvents]);

    } catch (err) {
        console.error("Fetch error:", err);
        failureCallback(err);
    }
},
        dateClick: function (info) {
            selectedDate = info.dateStr;
            selectedEvent = null;
            clearGRNForm();
            document.getElementById("c2").value = selectedDate;
            showOverlay();
            document.getElementById("formPopup").style.display = "block";
        },
        eventClick: function (info) {
            // ✅ Don't open GRN popup for issue events
            if (info.event.extendedProps.isIssue) return;

            selectedEvent = info.event;
            selectedDate  = info.event.startStr;
            let values    = (info.event.title || "").split(" | ");
            for (let i = 1; i <= 6; i++) document.getElementById("c" + i).value = values[i-1] || "";
            showOverlay();
            document.getElementById("formPopup").style.display = "block";
        },
    });
    calendar.render();
});

// ✅ Stock items cache for autocomplete
let stockItemsCache = [];

// ✅ Load stock items once for autocomplete
async function loadStockItemsForAutocomplete() {
    try {
        const res  = await fetch(`${API}/stockItems`, {
            headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }
        });
        const data = await res.json();
        stockItemsCache = (data.items || []).map(i => i.desc);
    } catch (err) {
        console.error("Failed to load stock items for autocomplete:", err);
    }
}

function handleDescInput(value) {
    const list = document.getElementById("descSuggestions");
    const query = value.toLowerCase().trim();

    if (!query || query.length < 2) {
        list.style.display = "none";
        return;
    }

    const matches = stockItemsCache.filter(desc =>
        desc.toLowerCase().includes(query)
    );

    if (!matches.length) {
        list.style.display = "none";
        return;
    }

    // ✅ Highlight matching text
    list.innerHTML = matches.slice(0, 10).map(desc => {
        const regex   = new RegExp(`(${query})`, "gi");
        const highlighted = desc.replace(regex, "<mark>$1</mark>");
        return `<div class="autocomplete-item" 
            onmousedown="selectDescSuggestion('${desc.replace(/'/g, "\\'")}')"
        >${highlighted}</div>`;
    }).join("");

    list.style.display = "block";
}

function selectDescSuggestion(desc) {
    document.getElementById("desc").value = desc;
    document.getElementById("descSuggestions").style.display = "none";
}

function hideDescSuggestions() {
    // ✅ Small delay so onmousedown fires before blur hides the list
    setTimeout(() => {
        const list = document.getElementById("descSuggestions");
        if (list) list.style.display = "none";
    }, 150);
}

function toggleSettings() {
    document.getElementById("settingsDropdown").classList.toggle("open");
}

document.addEventListener("click", (e) => {
    const wrapper = document.querySelector(".settings-wrapper");
    if (wrapper && !wrapper.contains(e.target)) {
        const dd = document.getElementById("settingsDropdown");
        if (dd) dd.classList.remove("open");
    }
});

async function logout() {
    const token = localStorage.getItem("token");
    try {
        await fetch(`${API}/logout`, { method: "POST", headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` } });
    } catch(e) {}
    localStorage.clear();
    window.location.href = "login.html";
}

function showOverlay() { document.getElementById("overlay").style.display = "block"; }

function calculate() {
    const unit    = parseFloat(document.querySelector(".unit")?.value)  || 0;
    const rate    = parseFloat(document.querySelector(".rate")?.value)  || 0;
    const tax     = parseFloat(document.querySelector(".tax")?.value)   || 0;
    const amount  = unit * rate;
    const gstAmt  = amount * tax / 100;
    const total   = amount + gstAmt;

    const af = document.querySelector(".amount");
    const gf = document.querySelector(".gstAmt");
    const tf = document.querySelector(".total");
    if (af) af.value = amount.toFixed(2);
    if (gf) gf.value = gstAmt.toFixed(2);
    if (tf) tf.value = total.toFixed(2);
}

function downloadExcel() {
    const date = calendar.getDate();
    const month = date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
    window.location.href = `${API}/download?month=${month}`;
}

async function downloadStock() {
    const date  = calendar.getDate();
    const month = date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");

    try {
        const res = await fetch(`${API}/downloadStock?month=${month}`, {
            headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }
        });
        if (!res.ok) throw new Error("Download failed");

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href     = url;
        a.download = `Stock_Register_${month}.xlsx`;
        a.click();
        URL.revokeObjectURL(url);
    } catch (err) {
        console.error("Download stock error:", err);
        alert("Failed to download stock register.");
    }
}

function showStockToast(stockResult) {
    const toast = document.getElementById("stockToast");
    if (stockResult.updated) {
        toast.className = "toast-success";
        const title = stockResult.newItem ? "✅ New Item Added to Stock" : "✅ Stock Register Updated";
        toast.innerHTML = `
            <div class="toast-title">${title}</div>
            <div>Item: <strong>${stockResult.matchedItem}</strong></div>
            <div>Sheet: ${stockResult.sheetName}</div>
            <div>${stockResult.previousQty} → ${stockResult.newQty} (+${stockResult.addedQty})</div>
        `;
    } else {
        toast.className = "toast-warning";
        toast.innerHTML = `
            <div class="toast-title">⚠️ Stock Not Updated</div>
            <div>${stockResult.reason}</div>
        `;
    }
    toast.style.display = "block";
    setTimeout(() => { toast.style.display = "none"; }, 5000);
}

function clearGRNForm() {
    for (let i = 1; i <= 6; i++) document.getElementById("c" + i).value = "";
}

function openItemPopupNew() {
    clearItemForm();
    loadStockItemsForAutocomplete(); // ✅ load suggestions
    document.getElementById("itemPopup").style.display = "block";
    showOverlay();
}

function openItemPopupEdit(grnId) {
    loadStockItemsForAutocomplete();
    fetch(`${API}/entries`)
        .then(res => res.json())
        .then(data => {
            const entry = data.find(e => e.id === grnId);
            if (entry && entry.items && entry.items.length > 0) {
                populateItemForm(entry.items[entry.items.length - 1]);
            } else {
                clearItemForm();
            }
            document.getElementById("itemPopup").style.display = "block";
            showOverlay();
        })
        .catch(() => {
            clearItemForm();
            document.getElementById("itemPopup").style.display = "block";
            showOverlay();
        });
}

function populateItemForm(item) {
    document.getElementById("po").value            = item.po       || "";
    document.getElementById("desc").value          = item.desc     || "";
    document.getElementById("location").value      = item.location || "";
    document.getElementById("remark").value        = item.remark   || "";
    document.getElementById("currentItemId").value = item.itemId   || "";
    const statusEl = document.getElementById("status");
    if (item.status) statusEl.value = item.status;
    if (item.unit || item.rate || item.uom) {
        document.getElementById("qtySelect").value = "show";
        document.querySelector(".qtyBox").style.display = "block";
        const uomEl = document.querySelector(".uom");
        if (uomEl && item.uom) uomEl.value = item.uom;
        document.querySelector(".unit").value   = item.unit   || "";
        document.querySelector(".rate").value   = item.rate   || "";
        document.querySelector(".tax").value    = item.tax    || "";
        document.querySelector(".gstAmt").value = item.gstAmt || "";
        document.querySelector(".amount").value = item.amount || "";
        document.querySelector(".total").value  = item.total  || "";
    } else {
        document.getElementById("qtySelect").value = "";
        document.querySelector(".qtyBox").style.display = "none";
    }
}

function saveData() {
    let payload = {
        date: selectedDate,
        col1: document.getElementById("c1").value,
        col2: document.getElementById("c2").value,
        col3: document.getElementById("c3").value,
        col4: document.getElementById("c4").value,
        col5: document.getElementById("c5").value,
        col6: document.getElementById("c6").value
    };

    if (!selectedEvent) {
        fetch(`${API}/addEntry`, {
            method: "POST",
            headers: { "Content-Type": "application/json",
                       "Authorization": `Bearer ${localStorage.getItem("token")}`
             },
            body: JSON.stringify(payload)
        })
        .then(res => { if (!res.ok) throw new Error("Add failed: " + res.status); return res.json(); })
        .then(data => {
            currentGRNId = data.id;
            closePopup();
            calendar.refetchEvents();
            alert("GRN Saved!");
            openItemPopupNew();
        })
        .catch(err => { console.error("Add Error:", err); alert("Failed to save GRN."); });
    } else {
        fetch(`${API}/updateEntry`, {
            method: "PUT",
            headers: { "Content-Type": "application/json",
                       "Authorization": `Bearer ${localStorage.getItem("token")}`
             },
            body: JSON.stringify({ id: Number(selectedEvent.id), updated: payload })
        })
        .then(res => { if (!res.ok) throw new Error("Update failed: " + res.status); return res.json(); })
        .then(() => {
            currentGRNId = Number(selectedEvent.id);
            closePopup();
            calendar.refetchEvents();
            alert("GRN Updated!");
            if (confirm("Do you want to update item details?")) openItemPopupEdit(currentGRNId);
        })
        .catch(err => { console.error("Update Error:", err); alert("Update failed."); });
    }
}

function deleteData() {
    if (!selectedEvent) { alert("Please click on an existing entry first."); return; }
    if (!confirm("⚠️ This will permanently delete the GRN entry and all its items.\n\nContinue?")) return;
    fetch(`${API}/deleteEntry/${selectedEvent.id}`, { method: "DELETE",
                                                      headers: {
                                                          "Authorization": `Bearer ${localStorage.getItem("token")}` 
                                                      }
     })
    .then(res => { if (!res.ok) throw new Error("Delete failed: " + res.status); return res.json(); })
    .then(() => { closePopup(); calendar.refetchEvents(); alert("GRN Deleted!"); })
    .catch(err => { console.error("Delete Error:", err); alert("Delete failed."); });
}

function saveItem() {
    if (!currentGRNId) { alert("No GRN selected. Please save a GRN first."); return; }
    const itemId = document.getElementById("currentItemId").value;
   let itemData = {
    po:       document.getElementById("po").value,
    desc:     document.getElementById("desc").value,
    uom:      document.querySelector(".uom")?.value    || "",
    unit:     document.querySelector(".unit")?.value   || "",
    rate:     document.querySelector(".rate")?.value   || "",
    amount:   document.querySelector(".amount")?.value || "",
    tax:      document.querySelector(".tax")?.value    || "",
    gstAmt:   document.querySelector(".gstAmt")?.value || "",   
    total:    document.querySelector(".total")?.value  || "",
    status:   document.getElementById("status").value,
    location: document.getElementById("location").value,
    remark:   document.getElementById("remark").value,

};

    if (itemId) {
        fetch(`${API}/updateItem/${itemId}`, {

            if (data.stockUpdate) showStockToast(data.stockUpdate);
        })
        .catch(err => { console.error("Item Update Error:", err); alert("Item update failed."); });
    } else {
        fetch(`${API}/addItem/${currentGRNId}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },

        })
        .then(res => { if (!res.ok) throw new Error("Item save failed: " + res.status); return res.json(); })
        .then(data => {

function deleteItem() {
    const itemId = document.getElementById("currentItemId").value;
    if (!itemId) { alert("No item to delete. Save an item first."); return; }
    if (!confirm("⚠️ This will permanently delete the item.\n\nContinue?")) return;
    fetch(`${API}/deleteItem/${itemId}`, { method: "DELETE" })
    .then(res => { if (!res.ok) throw new Error("Item delete failed: " + res.status); return res.json(); })
    .then(() => { alert("Item Deleted!"); clearItemForm(); closeItemPopup(); })
    .catch(err => { console.error("Item Delete Error:", err); alert("Item delete failed."); });
}

async function downloadIssues() {
    const date  = calendar.getDate();
    const month = date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");

    try {
        const res  = await fetch(`${API}/stockItems?month=${month}`, {
            headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }
        });
        const data = await res.json();
        const items = data.items || [];

        // ✅ Check if any issues exist
        const hasIssues = items.some(i => i.issues && i.issues.length > 0);
        if (!hasIssues) {
            alert("No issues found for " + month);
            return;
        }

        // ✅ Build table rows
        const rows = [["Item Description", "UOM", "Issue Date", "Qty Issued", "Issued By", "Remark"]];

        for (const item of items) {
            if (!item.issues || item.issues.length === 0) continue;
            for (const issue of item.issues) {
                rows.push([
                    item.desc      || "",
                    item.uom       || "",
                    issue.date     ? new Date(issue.date).toLocaleDateString("en-IN") : "",
                    issue.qty      || 0,
                    issue.issuedBy || "",
                    issue.remark   || ""
                ]);
            }
        }

        // ✅ Build Excel via SheetJS
        const ws = XLSX.utils.aoa_to_sheet(rows);

        // ✅ Set column widths
        ws['!cols'] = [
            { wch: 35 },  // Item Description
            { wch: 10 },  // UOM
            { wch: 16 },  // Issue Date
            { wch: 14 },  // Qty Issued
            { wch: 20 },  // Issued By
            { wch: 25 }   // Remark
        ];

        // ✅ Style header row bold
        const headerRange = XLSX.utils.decode_range(ws['!ref']);
        for (let C = headerRange.s.c; C <= headerRange.e.c; C++) {
            const cell = ws[XLSX.utils.encode_cell({ r: 0, c: C })];
            if (cell) cell.s = { font: { bold: true } };
        }

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Issues");
        XLSX.writeFile(wb, `Issues_${month}.xlsx`);

    } catch (err) {
        console.error("Download issues error:", err);
        alert("Failed to download issues.");
    }
}

let aiChatHistory = [];
let aiDataSummary = null;

function closeAIPopup() {

async function openAIAnalytics() {
    document.getElementById("aiLoading").style.display  = "block";
    document.getElementById("aiResults").style.display  = "none";
    document.getElementById("aiEmpty").style.display    = "none";
    document.getElementById("aiChatBox").style.display  = "none";
    document.getElementById("aiPopup").style.display    = "block";
    document.getElementById("overlay").style.display    = "block";
    aiChatHistory = [];
    document.getElementById("aiChatHistory").innerHTML  = "";

    try {
        const date  = calendar.getDate();
        const month = date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");

        // ✅ Fetch all three data sources in parallel
        const [grnRes, stockRes, auditRes] = await Promise.all([
            fetch(`${API}/entries`),
            fetch(`${API}/stockItems?month=${month}`, {
                headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }
            }),
            fetch(`${API}/auditLog`, {
                headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }
            })
        ]);

        const grnData   = await grnRes.json();
        const stockData = await stockRes.json();
        const auditData = await auditRes.json();

        if ((!grnData || grnData.length === 0) &&
            (!stockData.items || stockData.items.length === 0)) {
            document.getElementById("aiLoading").style.display = "none";
            document.getElementById("aiEmpty").style.display   = "block";
            return;
        }

        // ✅ Build combined summary
        const summary = buildCombinedSummary(grnData, stockData.items || [], auditData, month);
        aiDataSummary = summary;

        const insights = await getAIInsights(summary, month);

        document.getElementById("aiLoading").style.display = "none";
        document.getElementById("aiResults").style.display = "block";
        document.getElementById("aiChatBox").style.display = "block";
        renderInsights(insights);

    } catch (err) {
        console.error("AI analytics error:", err);
        document.getElementById("aiLoading").style.display = "none";
        document.getElementById("aiResults").innerHTML =
            `<div style="text-align:center;padding:20px;color:#ef4444;">
                Failed to load AI insights. Please try again.
            </div>`;
        document.getElementById("aiResults").style.display = "block";
    }
}

function buildCombinedSummary(grnData, stockItems, auditData, month) {
    const currentGRNs = grnData.filter(e => e.date && e.date.startsWith(month));

    // ✅ GRN summary
    const supplierMap = {};
    const grnItemMap  = {};
    let totalGRNSpend = 0;

    for (const grn of currentGRNs) {
        const supplier = grn.col4 || "Unknown";
        if (!supplierMap[supplier]) supplierMap[supplier] = { amount: 0, orders: 0 };
        supplierMap[supplier].orders += 1;
        if (!grn.items) continue;
        for (const item of grn.items) {
            if (!item.desc) continue;
            const amt = parseFloat(item.total) || 0;
            totalGRNSpend += amt;
            supplierMap[supplier].amount += amt;
            if (!grnItemMap[item.desc]) grnItemMap[item.desc] = { qty: 0, amount: 0, rate: [] };
            grnItemMap[item.desc].qty    += parseFloat(item.unit) || 0;
            grnItemMap[item.desc].amount += amt;
            grnItemMap[item.desc].rate.push(parseFloat(item.rate) || 0);
        }
    }

    const topSuppliers = Object.entries(supplierMap)
        .sort((a, b) => b[1].amount - a[1].amount)
        .slice(0, 5)
        .map(([name, v]) => ({ name, amount: Math.round(v.amount), orders: v.orders }));

    const topGRNItems = Object.entries(grnItemMap)
        .sort((a, b) => b[1].amount - a[1].amount)
        .slice(0, 5)
        .map(([desc, v]) => ({
            desc,
            qty:    Math.round(v.qty),
            amount: Math.round(v.amount),
            avgRate: v.rate.length > 0
                ? Math.round(v.rate.reduce((s, r) => s + r, 0) / v.rate.length)
                : 0
        }));

    // ✅ Stock summary
    const lowStockItems = stockItems
        .filter(i => i.closingQty > 0 && i.closingQty <= 5)
        .map(i => ({ desc: i.desc, qty: i.closingQty, uom: i.uom }));

    const outOfStockItems = stockItems
        .filter(i => i.closingQty <= 0)
        .map(i => ({ desc: i.desc, uom: i.uom }));

    const highValueItems = stockItems
        .sort((a, b) => (b.closingQty * b.weightedAvgRate) - (a.closingQty * a.weightedAvgRate))
        .slice(0, 5)
        .map(i => ({
            desc:       i.desc,
            closingQty: i.closingQty,
            rate:       i.weightedAvgRate,
            value:      Math.round(i.closingQty * i.weightedAvgRate)
        }));

    const totalStockValue = stockItems.reduce(
        (s, i) => s + (i.closingQty * i.weightedAvgRate), 0
    );

    // ✅ Audit summary
    const monthAudit  = auditData.filter(a =>
        a.timestamp && a.timestamp.startsWith(month)
    );
    const grnAudits   = monthAudit.filter(a => a.type === "GRN");
    const issueAudits = monthAudit.filter(a => a.type === "Issue");

    const totalIssued = issueAudits.reduce((s, a) => s + (parseFloat(a.qty) || 0), 0);

    const issuedItemMap = {};
    for (const a of issueAudits) {
        if (!a.itemDesc) continue;
        if (!issuedItemMap[a.itemDesc]) issuedItemMap[a.itemDesc] = 0;
        issuedItemMap[a.itemDesc] += parseFloat(a.qty) || 0;
    }

    const topIssuedItems = Object.entries(issuedItemMap)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5)
        .map(([desc, qty]) => ({ desc, qty: Math.round(qty) }));

    const mostActiveUser = (() => {
        const userMap = {};
        for (const a of monthAudit) {
            if (!a.doneBy) continue;
            userMap[a.doneBy] = (userMap[a.doneBy] || 0) + 1;
        }
        const sorted = Object.entries(userMap).sort((a, b) => b[1] - a[1]);
        return sorted.length > 0 ? sorted[0][0] : "N/A";
    })();

    return {
        month,
        grn: {
            totalGRNs:    currentGRNs.length,
            totalSpend:   Math.round(totalGRNSpend),
            topSuppliers,
            topItems:     topGRNItems
        },
        stock: {
            totalItems:       stockItems.length,
            totalStockValue:  Math.round(totalStockValue),
            lowStockItems:    lowStockItems.slice(0, 5),
            outOfStockItems:  outOfStockItems.slice(0, 5),
            highValueItems
        },
        audit: {
            totalMovements:  monthAudit.length,
            totalGRNEntries: grnAudits.length,
            totalIssues:     issueAudits.length,
            totalIssued:     Math.round(totalIssued),
            topIssuedItems,
            mostActiveUser
        }
    };
}

async function getAIInsights(summary, month) {
    const res  = await fetch(`${API}/aiInsights`, {
        method:  "POST",
        headers: {
            "Content-Type":  "application/json",
            "Authorization": `Bearer ${localStorage.getItem("token")}`
        },
        body: JSON.stringify({ summary, month, isChat: false })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Failed to get insights");
    return data;
}
function renderInsights(insights) {
    const container = document.getElementById("aiResults");

    let html = `
        <div style="background:var(--green-pale);border-radius:10px;padding:14px 18px;margin-bottom:16px;font-size:13px;color:var(--text-dark);line-height:1.6;">
            <strong>📊 Summary</strong><br>${insights.summary}
        </div>
    `;

    for (const insight of insights.insights) {
        html += `
            <div class="insight-card ${insight.type}">
                <div class="insight-title">
                    ${insight.type === "positive" ? "✅" :
                      insight.type === "warning"  ? "⚠️" :
                      insight.type === "alert"    ? "🚨" : "ℹ️"}
                    ${insight.title}
                </div>
                <div class="insight-desc">${insight.description}</div>
                <div class="insight-action">→ ${insight.action}</div>
            </div>
        `;
    }

    container.innerHTML = html;
}

async function askAI() {
    const input   = document.getElementById("aiChatInput");
    const question = input.value.trim();
    if (!question) return;
    if (!aiDataSummary) {
        alert("Please wait for AI Insights to finish loading first.");
        return;
    }
    const btn = document.getElementById("askBtn");
    btn.disabled    = true;
    btn.textContent = "...";
    input.value     = "";

    // ✅ Add user bubble
    const chatHistory = document.getElementById("aiChatHistory");
    const userBubble = document.createElement("div");
    userBubble.className   = "chat-bubble user";
    userBubble.textContent = question;
    chatHistory.appendChild(userBubble);
    chatHistory.scrollTop = chatHistory.scrollHeight;

    // ✅ Add to conversation history for context
    aiChatHistory.push({ role: "user", content: question });

    try {
    const res    = await fetch(`${API}/aiInsights`, {
        method:  "POST",
        headers: {
            "Content-Type":  "application/json",
            "Authorization": `Bearer ${localStorage.getItem("token")}`
        },
        body: JSON.stringify({
            summary:  aiDataSummary,
            messages: aiChatHistory,
            isChat:   true
        })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Failed");
    const answer = data.answer;

    if (!answer) throw new Error("Empty response from AI");

    // ✅ Add AI response to history
    aiChatHistory.push({ role: "assistant", content: answer });

    // ✅ Add AI bubble
    const aiBubble = document.createElement("div");
    aiBubble.className   = "chat-bubble ai";
    aiBubble.textContent = answer;
    chatHistory.appendChild(aiBubble);
    chatHistory.scrollTop = chatHistory.scrollHeight;

} catch (err) {
    console.error("Chat error:", err);
    const errBubble = document.createElement("div");
    errBubble.className = "chat-bubble ai";
    errBubble.style.color = "#ef4444";
    errBubble.textContent = "Failed to get response. Please try again.";
    chatHistory.appendChild(errBubble);
} finally {
        btn.disabled    = false;
        btn.textContent = "Ask →";
    }
}
