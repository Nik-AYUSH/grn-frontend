<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMKS Raylog — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green:       #4CAF50;
            --green-dark:  #388E3C;
            --green-light: #66BB6A;
            --green-pale:  #E8F5E9;
            --white:       #ffffff;
            --off-white:   #f9fafb;
            --text-dark:   #1a2e1b;
            --text-mid:    #4a6741;
            --text-light:  #7da876;
            --border:      rgba(76,175,80,0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--off-white);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(76,175,80,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(76,175,80,0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(76,175,80,0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .login-card {
            background: var(--white);
            border: 1px solid rgba(76,175,80,0.15);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(56,142,60,0.1), 0 4px 16px rgba(0,0,0,0.05);
        }

        .brand { text-align: center; margin-bottom: 28px; }

        .brand-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--green-dark), var(--green));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: var(--white);
            box-shadow: 0 8px 24px rgba(76,175,80,0.3);
            margin: 0 auto 16px;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--green-dark);
            margin-bottom: 6px;
        }

        .brand-subtitle {
            font-size: 12px;
            color: var(--text-light);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(76,175,80,0.2), transparent);
            margin-bottom: 24px;
        }

        .tabs {
            display: flex;
            background: var(--green-pale);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 7px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            background: none;
            color: var(--text-light);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--green-dark), var(--green));
            color: var(--white);
            box-shadow: 0 4px 12px rgba(76,175,80,0.3);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .form-group { margin-bottom: 18px; }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-mid);
            margin-bottom: 8px;
        }

        .input-wrapper { position: relative; }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.4;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: var(--off-white);
            border: 1.5px solid rgba(76,175,80,0.2);
            border-radius: 10px;
            color: var(--text-dark);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 13px 14px 13px 42px;
            transition: all 0.25s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--green);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(76,175,80,0.12);
        }

        .form-input::placeholder { color: rgba(74,103,65,0.35); }

        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }

        .password-toggle:hover { color: var(--green-dark); }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--green-dark), var(--green));
            color: var(--white);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(76,175,80,0.3);
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(76,175,80,0.45);
        }

        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .alert-msg {
            display: none;
            border-radius: 8px;
            font-size: 13px;
            padding: 12px 14px;
            margin-bottom: 18px;
        }

        .alert-error {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            color: #dc2626;
            animation: shake 0.4s ease;
        }

        .alert-success {
            background: rgba(76,175,80,0.1);
            border: 1px solid rgba(76,175,80,0.25);
            color: var(--green-dark);
        }

        .alert-msg.show { display: block; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .signup-note {
            font-size: 12px;
            color: var(--text-light);
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
            padding: 10px 14px;
            background: var(--green-pale);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: var(--text-light);
            margin-top: 24px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="brand">
            <div class="brand-logo">Y</div>
            <div class="brand-title">YMKS Raylog</div>
            <div class="brand-subtitle">Inventory Management System</div>
        </div>

        <div class="divider"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
            <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Login Panel -->
        <div class="tab-panel active" id="panel-login">
            <div id="loginError" class="alert-msg alert-error"></div>
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="loginUsername" class="form-input" placeholder="Enter your username" autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" autocomplete="current-password">
                    <button class="password-toggle" onclick="togglePassword('loginPassword','toggleLogin')" type="button" id="toggleLogin">👁</button>
                </div>
            </div>
            <button class="btn-submit" onclick="login()" id="loginBtn">Sign In</button>
        </div>

        <!-- Signup Panel -->
        <div class="tab-panel" id="panel-signup">
            <div id="signupMsg" class="alert-msg"></div>
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="signupUsername" class="form-input" placeholder="Enter your full name">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="signupPassword" class="form-input" placeholder="Min 8 chars, 1 uppercase, 1 special">
                    <button class="password-toggle" onclick="togglePassword('signupPassword','toggleSignup')" type="button" id="toggleSignup">👁</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="signupConfirm" class="form-input" placeholder="Re-enter your password">
                </div>
            </div>
            <button class="btn-submit" onclick="signup()" id="signupBtn">Create Account</button>
            <div class="signup-note">
                ℹ️ New accounts start with <strong>Viewer</strong> access. Contact your admin to update your role.
            </div>
        </div>
    </div>
    <div class="footer-text">© 2026 YMKS Solutions · Inventory Management</div>
</div>

<script>
const API = "https://grn-backend-production.up.railway.app";

const existingToken = localStorage.getItem("token");
if (existingToken) {
    // ✅ Verify token is still valid before redirecting
    fetch(`${API}/me`, {
        headers: { "Authorization": `Bearer ${existingToken}` }
    })
    .then(res => {
        if (res.ok) {
            redirectByRole(localStorage.getItem("role"));
        } else {
            // ✅ Token invalid — clear and stay on login page
            localStorage.clear();
        }
    })
    .catch(() => {
        localStorage.clear();
    });
}

function redirectByRole(role) {
    if (role === "admin" || role === "store_manager") window.location.href = "index.html";
    else if (role === "warehouse_worker") window.location.href = "warehouse.html";
    else window.location.href = "index.html";
}

function switchTab(tab) {
    document.querySelectorAll(".tab-btn").forEach((btn, i) => {
        btn.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
    });
    document.getElementById("panel-login").classList.toggle("active", tab === "login");
    document.getElementById("panel-signup").classList.toggle("active", tab === "signup");
}

function togglePassword(inputId, btnId) {
    const input = document.getElementById(inputId);
    const btn   = document.getElementById(btnId);
    input.type  = input.type === "password" ? "text" : "password";
    btn.textContent = input.type === "password" ? "👁" : "🙈";
}

document.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    if (document.getElementById("panel-login").classList.contains("active")) login();
    else signup();
});

async function login() {
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errorMsg = document.getElementById("loginError");
    const loginBtn = document.getElementById("loginBtn");
    errorMsg.classList.remove("show");
    if (!username || !password) {
        errorMsg.textContent = "⚠ Please enter both username and password.";
        errorMsg.classList.add("show");
        return;
    }
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="loader"></span>Signing in...';
    try {
        const res  = await fetch(`${API}/login`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (!res.ok) {
            errorMsg.textContent = "⚠ " + (data.error || "Invalid username or password.");
            errorMsg.classList.add("show");
            loginBtn.disabled = false;
            loginBtn.innerHTML = "Sign In";
            return;
        }
        localStorage.setItem("token", data.token);
        localStorage.setItem("username", data.user.username);
        localStorage.setItem("role", data.user.role);
        localStorage.setItem("userId", data.user.id);
            redirectByRole(data.user.role);
    } catch (err) {
        errorMsg.textContent = "⚠ Could not connect to server. Please try again.";
        errorMsg.classList.add("show");
        loginBtn.disabled = false;
        loginBtn.innerHTML = "Sign In";
    }
}

async function signup() {
    const username  = document.getElementById("signupUsername").value.trim();
    const password  = document.getElementById("signupPassword").value;
    const confirm   = document.getElementById("signupConfirm").value;
    const msgEl     = document.getElementById("signupMsg");
    const signupBtn = document.getElementById("signupBtn");
    msgEl.className = "alert-msg";
    msgEl.classList.remove("show");
    if (!username || !password || !confirm) {
        msgEl.textContent = "⚠ Please fill in all fields.";
        msgEl.classList.add("alert-error", "show");
        return;
    }
    if (password !== confirm) {
        msgEl.textContent = "⚠ Passwords do not match.";
        msgEl.classList.add("alert-error", "show");
        return;
    }
    signupBtn.disabled = true;
    signupBtn.innerHTML = '<span class="loader"></span>Creating account...';
    try {
        const res  = await fetch(`${API}/signup`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username, password, role: "viewer" }) });
        const data = await res.json();
        if (!res.ok) {
            msgEl.textContent = "⚠ " + (data.error || "Signup failed.");
            msgEl.classList.add("alert-error", "show");
            signupBtn.disabled = false;
            signupBtn.innerHTML = "Create Account";
            return;
        }
        msgEl.textContent = "✅ Account created! You can now sign in. Contact your admin to update your role.";
        msgEl.classList.add("alert-success", "show");
        signupBtn.disabled = false;
        signupBtn.innerHTML = "Create Account";
        document.getElementById("signupUsername").value = "";
        document.getElementById("signupPassword").value = "";
        document.getElementById("signupConfirm").value  = "";
        setTimeout(() => switchTab("login"), 2500);
    } catch (err) {
        msgEl.textContent = "⚠ Could not connect to server. Please try again.";
        msgEl.classList.add("alert-error", "show");
        signupBtn.disabled = false;
        signupBtn.innerHTML = "Create Account";
    }
}
</script>
</body>
</html>
